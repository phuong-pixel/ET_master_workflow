version: '3.8'

services:
  client-sync-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: client-sync-scheduler
    restart: unless-stopped
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount service account (nếu muốn update từ host)
      - ./service_account.json:/app/service_account.json:ro
      # Mount logs (optional)
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Health check (optional)
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 1h
      timeout: 10s
      retries: 3
      start_period: 10s
  
  client-sync-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: client-sync-api
    command: uvicorn api:app --host 0.0.0.0 --port 8386
    ports:
      - "8386:8386"
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PYTHONUNBUFFERED=1
    volumes:
      - ./service_account.json:/app/service_account.json:ro
    restart: unless-stopped

  client-sync-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: client-sync-dashboard
    env_file:
      - .env
    # Chạy lệnh streamlit thay vì command mặc định của Dockerfile
    command: streamlit run snapshot.py --server.port 8387 --server.address 0.0.0.0
    ports:
      - "8387:8387"
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PYTHONUNBUFFERED=1
    volumes:
      - ./service_account.json:/app/service_account.json:ro
    restart: unless-stopped